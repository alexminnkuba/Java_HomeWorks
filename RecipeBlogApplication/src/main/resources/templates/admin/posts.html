<!DOCTYPE html>
<html lang="ru" th:replace="~{base :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Все рецепты — Админ-панель</title>
</head>
<body>
<section class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Все рецепты</h1>
            <a th:href="@{/admin/posts/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> Добавить рецепт
            </a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Заголовок</th>
                        <th>Категория</th>
                        <th>Дата создания</th>
                        <th class="text-end">Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts}">
                        <td th:text="${post.title}"></td>
                        <td th:text="${post.getCategory()}"></td>
                        <td th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td class="text-end">
                            <a th:href="@{/admin/posts/edit/{id}(id=${post.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i> Изменить
                            </a>
                            <a th:href="@{/admin/posts/delete/{id}(id=${post.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Удалить рецепт');">
                                <i class="bi bi-trash"></i> Удалить
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(posts)}">
                        <td colspan="5" class="text-center text-muted py-5">
                            Рецептов пока нет. Добавьте первый!
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="text-center mt-4">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">← Назад</a>
        </div>
    </div>
</section>
</body>
</html>
