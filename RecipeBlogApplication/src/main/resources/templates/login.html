<!DOCTYPE html>
<html lang="ru" th:replace="~{base::layout(~{::section})}">
<body>
<section>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header text-center fs-4">Вход в аккаунт</div>
                    <div class="card-body">
                        <th:block th:if="${param.error}">
                            <p class="text-danger text-center">Неверный email или пароль</p>
                        </th:block>
                        <th:block th:if="${param.logout}">
                            <p class="text-success text-center">Вы успешно вышли</p>
                        </th:block>

                        <form th:action="@{/userLogin}" method="post">
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Пароль</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Войти</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
