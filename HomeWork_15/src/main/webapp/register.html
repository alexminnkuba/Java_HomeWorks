<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Регистрация нового пользователя</h2>
        <form action="register" method="post" class="content">
            <table>
                <tr>
                    <td>Имя пользователя</td>
                    <td><input type="text" name="username"></td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td>Пароль</td>
                    <td><input type="password" name="password"></td>
                </tr>
                <tr>
                    <td><input type="submit" value="Зарегистрироваться" class="submit"></td>
                    <td><input type="reset" value="Сбросить" class="reset"></td>
                </tr>
            </table>
        </form>
        <div class="content">
            <a href="home.html">На главную</a>
        </div>
    </div>
</body>
</html>
