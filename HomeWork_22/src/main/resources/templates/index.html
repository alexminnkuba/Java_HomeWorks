<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Блог - Главная</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Блог</h1>
    <div class="filters">
        <a href="/" class="filter-link">Все записи</a>
        <a href="/category?cat=Программирование" class="filter-link">Программирование</a>
        <a href="/category?cat=Путешествия" class="filter-link">Путешествия</a>
        <a href="/category?cat=Здоровье" class="filter-link">Здоровье</a>
        <a href="/category?cat=Веб-разработка" class="filter-link">Веб-разработка</a>
    </div>
    <div th:if="${selectedCategory}" style="margin-bottom: 15px;">
        <strong>Текущий фильтр:</strong> <span th:text="${selectedCategory}"></span>
    </div>
    <div th:each="post : ${posts}" class="post">
        <h2 th:text="${post.title}">Заголовок поста</h2>
        <div class="category">
            Категория: <span th:text="${post.category}">Категория</span>
        </div>
        <div class="author">
            Автор: <span th:text="${post.author}">Автор</span>
        </div>
        <p th:text="${post.content}">
            Краткое содержание...
        </p>
        <a th:href="@{/post/{id}(id=${post.id})}" class="read-more">Читать далее</a>
    </div>
    <div th:if="${#lists.isEmpty(posts)}" style="text-align: center; color: #666;">
        <p>Нет записей для отображения</p>
    </div>
</div>
</body>
</html>
